<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Generator - MarketAI Suite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <a href="/" class="back-link">← Back to Dashboard</a>
            <h1>Marketing Campaign Generator</h1>
            <p>Create data-driven marketing strategies and content.</p>
        </header>

        <div class="content-grid">
            <section class="input-section">
                <form method="POST" action="/campaign">
                    <div class="form-group">
                        <label for="product">Product/Solution</label>
                        <input type="text" id="product" name="product" required
                            placeholder="e.g., Enterprise Cloud Storage">
                    </div>

                    <div class="form-group">
                        <label for="audience">Target Audience Description</label>
                        <textarea id="audience" name="audience" required
                            placeholder="e.g., IT Managers in FinTech looking for scalable storage solutions..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="platform">Platform Selection</label>
                        <select id="platform" name="platform">
                            <option value="LinkedIn">LinkedIn</option>
                            <option value="Twitter/X">Twitter/X</option>
                            <option value="Instagram">Instagram</option>
                            <option value="Facebook">Facebook</option>
                            <option value="Email">Email Marketing</option>
                            <option value="Blog Post">Blog Post</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary">Generate Campaign</button>
                </form>
            </section>

            {% if output %}
            <section class="output-section">
                <h2>Generated Campaign Strategy</h2>
                <div class="output-content">
                    <pre>{{ output }}</pre>
                </div>
            </section>
            {% endif %}
        </div>
    </div>
</body>

</html>
